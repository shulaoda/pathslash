name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 20 is EOL and pnpm 11 needs Node 22.13+, so 22 is the floor.
        node: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Installs vp (version resolved from the lockfile), Node, and the deps.
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: ${{ matrix.node }}
          cache: true
          run-install: |
            - args: ['--frozen-lockfile']
      - run: vp run typecheck
      - run: vp test run
      - run: vp pack

  lint:
    name: lint & package checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: |
            - args: ['--frozen-lockfile']
      - run: vp check # oxfmt + oxlint
      - run: vp pack
      - name: Check the published package shape (publint + arethetypeswrong)
        run: vp run lint:package

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: |
            - args: ['--frozen-lockfile']
      - name: Coverage of our code (src)
        run: vp run test:coverage
      - name: Coverage of node:path reached by the fixtures
        run: vp run coverage:node
